<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Harfist</title><style>:root{--bg:#08111d;--card:#101b2a;--line:#ffffff1f;--txt:#f8fbff;--mut:#9eadbe;--g:#35a853;--y:#d7a72f;--x:#343e4c;--k:#2f3d50;--a:#38bdf8}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:radial-gradient(circle at top,#17304e 0,#08111d 58%);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;display:flex;justify-content:center}.app{width:100%;max-width:480px;min-height:100dvh;padding:14px;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#42d66f,#7dd3fc);display:grid;place-items:center;color:#06120a;font-weight:1000;box-shadow:0 12px 28px #38bdf833}h1{margin:0;font-size:27px;letter-spacing:.2px}.sub{font-size:12px;color:var(--mut)}button{cursor:pointer}.icon{border:1px solid var(--line);border-radius:13px;background:#ffffff12;color:white;font-weight:1000;padding:11px 12px}.status{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.pill{border:1px solid var(--line);border-radius:16px;background:#ffffff10;padding:10px}.lab{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px}.val{font-weight:1000}.center{text-align:center}.right{text-align:right}.board{margin:auto;display:grid;gap:8px;width:min(92vw,350px)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tile{aspect-ratio:1/1;border:2px solid var(--line);border-radius:13px;display:grid;place-items:center;background:#ffffff10;font-size:clamp(29px,8vw,37px);font-weight:1000;box-shadow:0 10px 20px #0005}.filled{border-color:#7dd3fc;background:#7dd3fc14}.green{background:linear-gradient(#37b85a,#2f9549)!important}.yellow{background:linear-gradient(#e2b63d,#c99c25)!important}.gray{background:linear-gradient(#465163,#303946)!important;color:#dce5f1}.shake{animation:shake .28s}.keys{display:flex;flex-direction:column;gap:7px;margin-top:18px}.kr{display:flex;justify-content:center;gap:5px}.key{height:45px;min-width:30px;border:0;border-radius:10px;background:linear-gradient(#3b4a60,#2c3849);color:white;font-weight:1000}.key.action{min-width:62px;background:linear-gradient(#eef2f7,#cdd5df);color:#111}.key.green{background:var(--g)!important}.key.yellow{background:var(--y)!important}.key.gray{background:#1f2733!important;color:#8d99a8!important}.try{height:53px;margin:13px auto 0;width:78%;border:0;border-radius:17px;background:linear-gradient(135deg,#38bdf8,#35a853);font-weight:1000;font-size:18px;color:#041014}.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#fff;color:#111827;padding:11px 17px;border-radius:14px;font-weight:900;opacity:0;transition:.2s;max-width:92%;text-align:center;z-index:9;box-shadow:0 20px 55px #0008}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;padding:18px;z-index:8;backdrop-filter:blur(8px)}.modal.show{display:grid}.box{width:min(410px,100%);background:#111b29;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 24px 70px #0008}.box h2{margin:0 0 10px}.box p{color:var(--mut);line-height:1.45}.box button{margin:6px;border:0;border-radius:13px;padding:12px 14px;font-weight:1000}.secondary{background:#ffffff16;color:#fff;border:1px solid var(--line)!important}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.stat{background:#ffffff10;border-radius:14px;padding:12px}.num{font-size:24px;font-weight:1000}.barrow{display:grid;grid-template-columns:26px 1fr 30px;gap:7px;align-items:center;margin:7px 0}.bar{height:18px;background:#ffffff14;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#38bdf8,#35a853)}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-width:380px){.key{min-width:27px;padding:0 5px}.tile{font-size:30px}.logo{width:39px;height:39px}h1{font-size:23px}}</style></head><body><div class="app"><div class="top"><div class="brand"><div class="logo">H</div><div><h1>Harfist</h1><div class="sub">Türkçe kelime oyunu</div></div></div><div><button class="icon" id="newGame">↻</button><button class="icon" id="share">↗</button><button class="icon" id="stats">▥</button><button class="icon" id="help">?</button></div></div><div class="status"><div class="pill"><div class="lab">Kelime</div><div class="val" id="used">0/0</div></div><div class="pill center"><div class="lab">Deneme</div><div class="val" id="try">1/6</div></div><div class="pill right"><div class="lab">Seri</div><div class="val" id="streak">0</div></div></div><main class="board" id="board"></main><section class="keys" id="keys"></section><button class="try" id="submit">DENE</button></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><h2 id="mt"></h2><div id="mc"></div><div id="ma"></div></div></div><script>const WORDS=`ACEMİ|ARİFE|ARİZA|KİTAP|KALEM|DENİZ|GÜNEŞ|ÇİÇEK|ŞEKER|KÖPEK|BULUT|DÜNYA|SABAH|AKŞAM|İNCİR|BİBER|PİLAV|KİRAZ|ÇİLEK|GÜZEL|SİMİT|BİLGİ|KAPAK|KÜREK|TABAK|ÇANTA|KEMER|DOLAP|RADYO|FIRIN|YAZAR|KÖPRÜ|SICAK|SOĞUK|KÜÇÜK|BÜYÜK|TEMİZ|SAKİN|TARİH|TAKİP|YAKIN|ZAMAN|YEMEK|RESİM|KURAL|MUTLU|HUZUR|SEVGİ|NEHİR|YÜREK|BEYAZ|SİYAH|YEŞİL|ALTIN|KUZEY|GÜNEY|ÇINAR|ARMUT|KAVUN|LİMON|BALIK|SINIF|MASAL|MÜZİK|SANAT|PAZAR|SAHİL|MERAK|CESUR|GÜVEN|BARIŞ|ÇORBA|EKMEK|KAHVE|KAŞIK|ÇATAL|TABLO|PERDE|LAMBA|KİLİM|BAKIR|DEMİR|ÇAMUR|YAĞIZ|YAĞLI|KURUŞ|PARÇA|DİLEK|NİYET|HAYAL|DOĞRU|TATLI|TUZLU|GÖLGE|ADALE|AHLAK|AKRAN|AKREP|AKSAK|AKSAM|AKSAN|AKTAR|AKTİF|ALACA|ALARM|ALEVİ|ALGIN|ALKIŞ|AMBAR|ANLAM|ANLIK|ANONS|ARADA|ARAZİ|ARDIÇ|ARENA|ARŞIN|ASKER|ASLAN|ASTAR|AŞAMA|AŞILI|ATLAS|AYDIN|AYLAK|AYRAÇ|AYRAN|AYRIM|AZGIN|AZILI|BACAK|BADEM|BAHAR|BAHÇE|BAKIM|BALCI|BALON|BAMYA|BARAK  ro=document.createElement('div');ro.className='row';for(let c=0;c<5;c++){let t=document.createElement('div');t.className='tile';t.id=`t${r}${c}`;ro.appendChild(t)}b.appendChild(ro)}let k=$('keys');k.innerHTML='';[['E','R','T','Y','U','I','O','P','Ğ','Ü'],['A','S','D','F','G','H','J','K','L','Ş','İ'],['Z','C','V','B','N','M','Ö','Ç','SİL']].forEach(a=>{let ro=document.createElement('div');ro.className='kr';a.forEach(x=>{let bt=document.createElement('button');bt.className=x==='SİL'?'key action':'key';bt.dataset.key=x;bt.textContent=x;bt.onclick=()=>press(x);ro.appendChild(bt)});k.appendChild(ro)})}function update(){let s=get(S,def());$('try').textContent=over?'Bitti':`${Math.min(row+1,6)}/6`;$('streak').textContent=s.cs;$('used').textContent=`${get(U,[]).length}/${WORDS.length}`}function pick(){let u=get(U,[]),setU=new Set(u),av=WORDS.filter(w=>!setU.has(w));if(!av.length){u=[];av=WORDS;toast('Tüm kelimeler bitti, liste yenilendi')}let w=av[Math.floor(Math.random()*av.length)];u.push(w);set(U,u);return w}function start(){ans=pick();row=0;col=0;guess='';over=false;history=[];build();update()}function press(x){if(over)return;if(x==='SİL')del();else if(L.includes(x))add(x)}function add(x){if(col>=5)return;guess+=x;let t=$(`t${row}${col}`);t.textContent=x;t.classList.add('filled');col++}function del(){if(col<=0)return;col--;guess=guess.slice(0,-1);let t=$(`t${row}${col}`);t.textContent='';t.className='tile'}function shake(){for(let i=0;i<5;i++){let t=$(`t${row}${i}`);t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),300)}}function submit(){if(over)return;if(guess.length!==5){shake();toast('5 harfli kelime gir');return}if(!ok(guess)){shake();toast('Bu kelime sözlükte yok. Deneme hakkın gitmedi.');return}let pattern=reveal(guess);history.push(pattern);if(guess===ans){over=true;win(row+1);update();setTimeout(()=>modal('Tebrikler 🎉',`<p>Kelime: <b>${ans}</b></p><p>${row+1}. denemede bildin.</p>`),350);return}row++;col=0;guess='';update();if(row>=6){over=true;lose();update();setTimeout(()=>modal('Oyun bitti',`<p>Doğru kelime: <b>${ans}</b></p>`),350)}}function reveal(w){let a=[...ans],q=[...w],res=Array(5).fill('gray'),rr=row;for(let i=0;i<5;i++)if(q[i]===a[i]){res[i]='green';a[i]=null;q[i]=null}for(let i=0;i<5;i++)if(q[i]&&a.includes(q[i])){res[i]='yellow';a[a.indexOf(q[i])]=null}for(let i=0;i<5;i++){setTimeout(()=>{$(`t${rr}${i}`).classList.add(res[i]);keyColor(w[i],res[i])},i*80)}return res.map(x=>x==='green'?'🟩':x==='yellow'?'🟨':'⬛').join('')}function keyColor(ch,c){let k=document.querySelector(`button[data-key="${ch}"]`);if(!k)return;let p={gray:1,yellow:2,green:3},old=['green','yellow','gray'].find(x=>k.classList.contains(x));if(!old||p[c]>p[old]){k.classList.remove('green','yellow','gray');k.classList.add(c)}}function win(n){let s=get(S,def());s.p++;s.w++;s.cs++;s.bs=Math.max(s.bs,s.cs);s.d[n-1]++;s.tg+=n;set(S,s)}function lose(){let s=get(S,def());s.p++;s.l++;s.cs=0;set(S,s)}function stats(){let s=get(S,def()),rate=s.p?Math.round(s.w/s.p*100):0,avg=s.w?(s.tg/s.w).toFixed(2):'0',mx=Math.max(1,...s.d);modal('Başarı Grafiği',`<div class=statgrid><div class=stat><div class=num>${s.p}</div><div>Toplam</div></div><div class=stat><div class=num>${rate}%</div><div>Başarı</div></div><div class=stat><div class=num>${s.cs}</div><div>Seri</div></div><div class=stat><div class=num>${avg}</div><div>Ortalama</div></div></div>${s.d.map((v,i)=>`<div class=barrow><b>${i+1}</b><div class=bar><div class=fill style="width:${v?Math.max(7,v/mx*100):0}%"></div></div><span>${v}</span></div>`).join('')}`)}function share(){let txt=`HARFIST ${history.length||'-'}/6\n${history.join('\n')}\nhttps://gibiamie.github.io/Harfist/`;if(navigator.share)navigator.share({text:txt});else navigator.clipboard.writeText(txt).then(()=>toast('Sonuç kopyalandı'))}function modal(t,h){$('mt').textContent=t;$('mc').innerHTML=h;$('ma').innerHTML='<button onclick="closeM();start()">Yeni oyun</button><button class="secondary" onclick="share()">Paylaş</button><button class="secondary" onclick="closeM()">Kapat</button>';$('modal').classList.add('show')}function closeM(){$('modal').classList.remove('show')}function toast(m){let x=$('toast');x.textContent=m;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1700)}$('submit').onclick=submit;$('newGame').onclick=start;$('stats').onclick=stats;$('share').onclick=share;$('help').onclick=()=>modal('Nasıl oynanır?','<p>5 harfli Türkçe kelimeyi 6 denemede bul.</p><p>Yeşil: doğru yer. Sarı: harf var ama yeri yanlış. Gri: kelimede yok.</p><p>Sözlükte olmayan kelimeler kabul edilmez ve deneme hakkı gitmez.</p>');document.addEventListener('keydown',e=>{let k=up(e.key);if(e.key==='Enter')submit();else if(e.key==='Backspace')del();else if(L.includes(k))add(k)});start();</script></body></html>
