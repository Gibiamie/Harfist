<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Harfist</title>
<style>
:root{--bg:#07090d;--card:rgba(255,255,255,.07);--border:rgba(255,255,255,.12);--text:#f7f8fb;--muted:#9fa8b6;--green:#35a853;--yellow:#d7a72f;--gray:#3b4350;--key:#2b3441;--key2:#374456;--accent:#38bdf8}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:radial-gradient(circle at top,#1b2b42 0,#0b1018 45%,#07090d 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;display:flex;justify-content:center}.app{width:100%;max-width:480px;min-height:100dvh;padding:14px;display:flex;flex-direction:column}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#42d66f,#7dd3fc);display:flex;align-items:center;justify-content:center;color:#06120a;font-weight:1000;box-shadow:0 10px 28px rgba(56,189,248,.2)}h1{margin:0;font-size:23px}.sub{font-size:12px;color:var(--muted);margin-top:1px}.actions{display:flex;gap:7px}.icon{width:40px;height:40px;border:1px solid var(--border);border-radius:13px;background:var(--card);color:white;font-weight:1000;font-size:17px;cursor:pointer}.status{display:flex;justify-content:space-between;border:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border-radius:18px;padding:10px 12px;margin-bottom:12px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}.value{font-size:15px;font-weight:1000}.center{text-align:center}.right{text-align:right}.boardWrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:370px}.board{display:grid;gap:8px;width:min(92vw,350px)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tile{aspect-ratio:1/1;min-height:54px;background:rgba(255,255,255,.055);border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(27px,8vw,36px);font-weight:1000;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 20px rgba(0,0,0,.18);transition:.18s}.tile.filled{border-color:rgba(125,211,252,.6);background:rgba(125,211,252,.08);animation:pop .12s}.tile.green{background:linear-gradient(180deg,var(--green),#2f8f47);border-color:rgba(255,255,255,.18)}.tile.yellow{background:linear-gradient(180deg,#e0b33c,var(--yellow));border-color:rgba(255,255,255,.18)}.tile.gray{background:linear-gradient(180deg,#46505e,var(--gray));border-color:rgba(255,255,255,.10);color:#d9dee7}.tile.reveal{animation:flip .42s}.tile.shake{animation:shake .28s}.keyboard{display:flex;flex-direction:column;gap:7px;margin-top:12px}.keyrow{display:flex;justify-content:center;gap:5px}.key{height:47px;min-width:31px;padding:0 7px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:linear-gradient(180deg,var(--key2),var(--key));color:white;font-weight:1000;font-size:15px;cursor:pointer;box-shadow:0 7px 14px rgba(0,0,0,.18)}.key.action{min-width:62px;background:linear-gradient(180deg,#e7eaef,#bdc5cf);color:#111827;font-size:13px}.key.green{background:linear-gradient(180deg,var(--green),#2f8f47)}.key.yellow{background:linear-gradient(180deg,#e0b33c,var(--yellow))}.key.gray{background:linear-gradient(180deg,#555f6c,#3e4652);color:#c6ccd5}.primary{height:52px;margin:12px auto 0;width:min(78%,330px);border:0;border-radius:16px;background:linear-gradient(135deg,#38bdf8,#35a853);color:#031009;font-weight:1000;font-size:18px;cursor:pointer}.toast{position:fixed;top:78px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(247,248,251,.96);color:#111827;padding:11px 17px;border-radius:14px;font-weight:900;opacity:0;pointer-events:none;transition:.22s;z-index:30;max-width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.64);display:none;align-items:center;justify-content:center;padding:18px;z-index:25;backdrop-filter:blur(10px)}.modal.show{display:flex}.box{width:100%;max-width:410px;background:linear-gradient(180deg,rgba(31,39,52,.96),rgba(17,22,31,.96));border:1px solid var(--border);border-radius:24px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35);max-height:88dvh;overflow:auto}.box h2{margin:0 0 10px;font-size:24px}.box p{color:var(--muted);line-height:1.5}.modalActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}.box button{border:0;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#35a853);color:#031009;font-weight:1000;padding:13px 16px;cursor:pointer}.box button.secondary{background:rgba(255,255,255,.1);color:white;border:1px solid var(--border)}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.stat{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px}.num{font-size:25px;font-weight:1000}.barrow{display:grid;grid-template-columns:30px 1fr 36px;gap:8px;align-items:center;margin:10px 0}.bar{height:20px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#38bdf8,#35a853);border-radius:999px}.legend{display:grid;gap:8px;margin-top:12px}.legend div{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:14px}.sw{width:22px;height:22px;border-radius:7px}.small{font-size:12px;color:var(--muted)}@keyframes pop{50%{transform:scale(1.08)}}@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-width:380px){.app{padding-left:10px;padding-right:10px}.key{min-width:28px;height:44px;font-size:14px;padding:0 5px}.key.action{min-width:56px}h1{font-size:20px}.logo{width:38px;height:38px}}
</style>
</head>
<body>
<div class="app"><div class="top"><div class="brand"><div class="logo">H</div><div><h1>Harfist</h1><div class="sub">5 harf • 6 deneme • Türkçe</div></div></div><div class="actions"><button class="icon" id="newGame">↻</button><button class="icon" id="stats">▥</button><button class="icon" id="help">?</button></div></div><div class="status"><div><div class="label">Kelime</div><div class="value" id="usedCount">0 / 2000</div></div><div class="center"><div class="label">Deneme</div><div class="value" id="tryCount">1 / 6</div></div><div class="right"><div class="label">Seri</div><div class="value" id="streakCount">0</div></div></div><div class="boardWrap"><main class="board" id="board"></main></div><section class="keyboard" id="keyboard"></section><button class="primary" id="submit">DENE</button></div>
<div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><h2 id="modalTitle"></h2><div id="modalText"></div><div class="modalActions" id="modalActions"></div></div></div>
<script>
const WORD_SOURCE='https://raw.githubusercontent.com/mertemin/turkish-word-list/master/words.txt';
const FALLBACK=['ACEMİ','ARİFE','ARİZA','KİTAP','KALEM','DENİZ','GÜNEŞ','ÇİÇEK','ŞEKER','KÖPEK','BULUT','DÜNYA','SABAH','AKŞAM','İNCİR','BİBER','PİLAV','KİRAZ','ÇİLEK','GÜZEL','SİMİT','BİLGİ','KAPAK','KÜREK','TABAK','ÇANTA','KEMER','DOLAP','RADYO','FIRIN','YAZAR','KÖPRÜ','SICAK','SOĞUK','KÜÇÜK','BÜYÜK','TEMİZ','SAKİN','TARİH','TAKİP','YAKIN','ZAMAN','YEMEK','RESİM','ŞAHİN','ŞİİRİ'];
let ANSWER_WORDS=[];const STORAGE_USED='harfist_used_v1',STORAGE_STATS='harfist_stats_v1';
const TURKISH_LETTERS=['E','R','T','Y','U','I','O','P','Ğ','Ü','A','S','D','F','G','H','J','K','L','Ş','İ','Z','C','V','B','N','M','Ö','Ç'];
let answer='',row=0,col=0,currentGuess='',gameOver=false,loaded=false;
const board=document.getElementById('board'),keyboard=document.getElementById('keyboard'),toast=document.getElementById('toast'),modal=document.getElementById('modal'),modalTitle=document.getElementById('modalTitle'),modalText=document.getElementById('modalText'),modalActions=document.getElementById('modalActions'),usedCount=document.getElementById('usedCount'),tryCount=document.getElementById('tryCount'),streakCount=document.getElementById('streakCount');
function up(t){return t.toLocaleUpperCase('tr-TR').replaceAll('Â','A').replaceAll('Î','İ').replaceAll('Û','U')}function validGuess(w){return [...w].length===5&&[...w].every(ch=>TURKISH_LETTERS.includes(ch))}
function cleanWords(text){const seen=new Set();return text.split(/\r?\n/).map(x=>up(x.trim())).filter(w=>!w.includes(' ')&&!w.includes('-')&&!w.includes("'")&&validGuess(w)).filter(w=>{if(seen.has(w))return false;seen.add(w);return true}).slice(0,2000)}
async function loadWords(){try{const r=await fetch(WORD_SOURCE,{cache:'force-cache'});const t=await r.text();ANSWER_WORDS=cleanWords(t);if(ANSWER_WORDS.length<100)throw new Error('word load failed')}catch(e){ANSWER_WORDS=FALLBACK}loaded=true;startGame()}
function getUsed(){try{return JSON.parse(localStorage.getItem(STORAGE_USED)||'[]')}catch(e){return[]}}function setUsed(v){localStorage.setItem(STORAGE_USED,JSON.stringify(v))}function defStats(){return{played:0,wins:0,losses:0,currentStreak:0,bestStreak:0,guessDist:[0,0,0,0,0,0],totalGuessesWon:0}}function getStats(){try{return JSON.parse(localStorage.getItem(STORAGE_STATS)||'null')||defStats()}catch(e){return defStats()}}function setStats(s){localStorage.setItem(STORAGE_STATS,JSON.stringify(s))}
function buildBoard(){board.innerHTML='';for(let r=0;r<6;r++){let rowEl=document.createElement('div');rowEl.className='row';for(let c=0;c<5;c++){let t=document.createElement('div');t.className='tile';t.id=`tile-${r}-${c}`;rowEl.appendChild(t)}board.appendChild(rowEl)}}
function buildKeyboard(){keyboard.innerHTML='';[['E','R','T','Y','U','I','O','P','Ğ','Ü'],['A','S','D','F','G','H','J','K','L','Ş','İ'],['Z','C','V','B','N','M','Ö','Ç','SİL']].forEach(keys=>{let rr=document.createElement('div');rr.className='keyrow';keys.forEach(k=>{let b=document.createElement('button');b.className=k==='SİL'?'key action':'key';b.textContent=k;b.dataset.key=k;b.onclick=()=>handleKey(k);rr.appendChild(b)});keyboard.appendChild(rr)})}
function updateTop(){let s=getStats();usedCount.textContent=`${getUsed().length} / ${ANSWER_WORDS.length||2000}`;tryCount.textContent=gameOver?'Bitti':`${Math.min(row+1,6)} / 6`;streakCount.textContent=s.currentStreak}
function selectAnswer(){let used=getUsed(),set=new Set(used),available=ANSWER_WORDS.filter(w=>!set.has(w));if(!available.length){showModal('Tüm kelimeler tamamlandı','<p>Bu tarayıcıda tüm cevaplar kullanıldı.</p>','<button onclick="resetUsedAndStart()">Kelime geçmişini sıfırla</button>');return null}let w=available[Math.floor(Math.random()*available.length)];used.push(w);setUsed(used);return w}
function startGame(){if(!loaded){showToast('Kelimeler yükleniyor');return}let w=selectAnswer();if(!w)return;answer=w;row=0;col=0;currentGuess='';gameOver=false;buildBoard();buildKeyboard();updateTop();showToast('Yeni oyun başladı')}
function handleKey(k){if(gameOver)return;if(k==='SİL')removeLetter();else if(TURKISH_LETTERS.includes(k))addLetter(k)}function addLetter(l){if(col>=5)return;currentGuess+=l;let t=document.getElementById(`tile-${row}-${col}`);t.textContent=l;t.classList.add('filled');col++}function removeLetter(){if(col<=0)return;col--;currentGuess=currentGuess.slice(0,-1);let t=document.getElementById(`tile-${row}-${col}`);t.textContent='';t.className='tile'}function shakeRow(){for(let i=0;i<5;i++){let t=document.getElementById(`tile-${row}-${i}`);t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),300)}}
function submitGuess(){if(gameOver)return;if(currentGuess.length!==5){shakeRow();showToast('5 harfli kelime gir');return}if(!validGuess(currentGuess)){shakeRow();showToast('Sadece Türkçe harf kullan');return}revealGuess(currentGuess);if(currentGuess===answer){gameOver=true;recordWin(row+1);updateTop();setTimeout(()=>showModal('Tebrikler 🎉',`<p>Kelime: <b>${answer}</b></p><p>${row+1}. denemede bildin.</p>`,`<button onclick="closeModal();startGame()">Yeni oyun</button><button class="secondary" onclick="showStats()">Başarı grafiği</button>`),650);return}row++;col=0;currentGuess='';updateTop();if(row>=6){gameOver=true;recordLoss();updateTop();setTimeout(()=>showModal('Oyun bitti',`<p>Doğru kelime: <b>${answer}</b></p>`,`<button onclick="closeModal();startGame()">Yeni oyun</button><button class="secondary" onclick="showStats()">Başarı grafiği</button>`),650)}}
function revealGuess(g){const revealRow=row;let ans=[...answer],gue=[...g],res=Array(5).fill('gray');for(let i=0;i<5;i++){if(gue[i]===ans[i]){res[i]='green';ans[i]=null;gue[i]=null}}for(let i=0;i<5;i++){if(gue[i]&&ans.includes(gue[i])){res[i]='yellow';ans[ans.indexOf(gue[i])]=null}}for(let i=0;i<5;i++){setTimeout(()=>{let t=document.getElementById(`tile-${revealRow}-${i}`);t.classList.add('reveal',res[i]);updateKeyColor(g[i],res[i])},i*85)}}
function updateKeyColor(l,color){let k=document.querySelector(`button[data-key="${l}"]`);if(!k)return;let p={gray:1,yellow:2,green:3},ex=['green','yellow','gray'].find(c=>k.classList.contains(c));if(!ex||p[color]>p[ex]){k.classList.remove('green','yellow','gray');k.classList.add(color)}}
function recordWin(tries){let s=getStats();s.played++;s.wins++;s.currentStreak++;s.bestStreak=Math.max(s.bestStreak,s.currentStreak);s.guessDist[tries-1]++;s.totalGuessesWon+=tries;setStats(s)}function recordLoss(){let s=getStats();s.played++;s.losses++;s.currentStreak=0;setStats(s)}
function showStats(){let s=getStats(),rate=s.played?Math.round(s.wins/s.played*100):0,avg=s.wins?(s.totalGuessesWon/s.wins).toFixed(2):'0',max=Math.max(1,...s.guessDist),bars=s.guessDist.map((v,i)=>`<div class="barrow"><b>${i+1}</b><div class="bar"><div class="fill" style="width:${v?Math.max(7,v/max*100):0}%"></div></div><span>${v}</span></div>`).join('');showModal('Başarı Grafiği',`<div class="statgrid"><div class="stat"><div class="num">${s.played}</div><div class="label">Toplam oyun</div></div><div class="stat"><div class="num">${rate}%</div><div class="label">Başarı oranı</div></div><div class="stat"><div class="num">${s.currentStreak}</div><div class="label">Mevcut seri</div></div><div class="stat"><div class="num">${s.bestStreak}</div><div class="label">En uzun seri</div></div><div class="stat"><div class="num">${avg}</div><div class="label">Ortalama deneme</div></div><div class="stat"><div class="num">${getUsed().length}/${ANSWER_WORDS.length}</div><div class="label">Kullanılan kelime</div></div></div>${bars}`,'<button onclick="closeModal()">Kapat</button><button class="secondary" onclick="resetStats()">İstatistiği sıfırla</button>')}
function resetStats(){setStats(defStats());updateTop();showStats()}function resetUsedAndStart(){setUsed([]);closeModal();startGame()}function showHelp(){showModal('Nasıl oynanır?',`<p>Gizli 5 harfli Türkçe kelimeyi 6 denemede bul.</p><p>Başlangıçta hiçbir harf verilmez.</p><div class="legend"><div><span class="sw green" style="background:var(--green)"></span>Doğru harf, doğru yer</div><div><span class="sw yellow" style="background:var(--yellow)"></span>Harf var, yeri yanlış</div><div><span class="sw gray" style="background:var(--gray)"></span>Harf kelimede yok</div></div><p class="small">I ve İ, O ve Ö, U ve Ü farklı harflerdir.</p>`,'<button onclick="closeModal()">Tamam</button>')}
function showModal(t,h,a){modalTitle.textContent=t;modalText.innerHTML=h;modalActions.innerHTML=a||'<button onclick="closeModal()">Tamam</button>';modal.classList.add('show')}function closeModal(){modal.classList.remove('show')}function showToast(m){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1450)}
document.getElementById('submit').onclick=submitGuess;document.getElementById('newGame').onclick=startGame;document.getElementById('stats').onclick=showStats;document.getElementById('help').onclick=showHelp;document.addEventListener('keydown',e=>{let k=up(e.key);if(e.key==='Enter')submitGuess();else if(e.key==='Backspace')removeLetter();else if(TURKISH_LETTERS.includes(k))addLetter(k)});buildBoard();buildKeyboard();showToast('Kelimeler yükleniyor');loadWords();
</script>
</body>
</html>
