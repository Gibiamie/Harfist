<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Harfist</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100dvh;overflow-x:hidden}body{background:radial-gradient(circle at top,#17304e 0,#08111d 58%);color:#f8fbff;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;display:flex;justify-content:center}.app{width:100%;max-width:480px;min-height:100dvh;padding:14px;display:flex;flex-direction:column;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#42d66f,#7dd3fc);display:grid;place-items:center;color:#06120a;font-weight:1000}h1{margin:0;font-size:27px;line-height:1}.sub{font-size:12px;color:#9eadbe;margin-top:3px}.actions{display:flex;gap:5px}.icon{border:1px solid #ffffff22;border-radius:13px;background:#ffffff12;color:white;font-weight:1000;padding:11px 12px}.status{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.pill{border:1px solid #ffffff22;border-radius:16px;background:#ffffff10;padding:10px}.lab{font-size:11px;color:#9eadbe;text-transform:uppercase;letter-spacing:.7px}.val{font-weight:1000}.center{text-align:center}.right{text-align:right}.board{margin:auto;display:grid;gap:8px;width:min(92vw,350px)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tile{aspect-ratio:1/1;border:2px solid #ffffff22;border-radius:13px;display:grid;place-items:center;background:#ffffff10;font-size:clamp(29px,8vw,37px);font-weight:1000}.filled{border-color:#7dd3fc;background:#7dd3fc14}.green{background:#35a853!important}.yellow{background:#d7a72f!important}.gray{background:#465163!important;color:#dce5f1}.shake{animation:shake .28s}.keys{display:flex;flex-direction:column;gap:7px;margin-top:18px}.kr{display:flex;justify-content:center;gap:5px}.key{height:45px;min-width:30px;border:0;border-radius:10px;background:#334259;color:white;font-weight:1000}.key.action{min-width:62px;background:#e7edf5;color:#111}.key.green{background:#35a853!important}.key.yellow{background:#d7a72f!important}.key.gray{background:#ef6f6c!important;color:white!important}.try{height:53px;margin:13px auto 0;width:min(78%,330px);border:0;border-radius:17px;background:linear-gradient(135deg,#38bdf8,#35a853);font-weight:1000;font-size:18px;color:#041014}.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#fff;color:#111827;padding:11px 17px;border-radius:14px;font-weight:900;opacity:0;transition:.2s;max-width:92%;text-align:center;z-index:9}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;padding:18px;z-index:8}.modal.show{display:grid}.box{width:min(410px,100%);background:#111b29;border:1px solid #ffffff22;border-radius:22px;padding:20px}.box button{margin:6px;border:0;border-radius:13px;padding:12px 14px;font-weight:1000}.secondary{background:#ffffff16;color:#fff;border:1px solid #ffffff22!important}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.stat{background:#ffffff10;border-radius:14px;padding:12px}.num{font-size:24px;font-weight:1000}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-width:380px){.app{padding:10px}.key{min-width:27px;padding:0 5px}.tile{font-size:30px}.logo{width:39px;height:39px}h1{font-size:23px}.icon{padding:9px 10px}}</style></head><body><div class="app"><div class="top"><div class="brand"><div class="logo">H</div><div><h1>Harfist</h1><div class="sub" id="sub">Sözlük hazırlanıyor...</div></div></div><div class="actions"><button class="icon" id="newGame">↻</button><button class="icon" id="share">↗</button><button class="icon" id="stats">▥</button><button class="icon" id="help">?</button></div></div><div class="status"><div class="pill"><div class="lab">Liste</div><div class="val">GÜVENLİ</div></div><div class="pill center"><div class="lab">Deneme</div><div class="val" id="try">1/6</div></div><div class="pill right"><div class="lab">Seri</div><div class="val" id="streak">0</div></div></div><main class="board" id="board"></main><section class="keys" id="keys"></section><button class="try" id="submit">DENE</button></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><h2 id="mt"></h2><div id="mc"></div><div id="ma"></div></div></div><script>const FALLBACK=['ACEMİ','ARİFE','ARİZA','KİTAP','KALEM','DENİZ','GÜNEŞ','ÇİÇEK','ŞEKER','KÖPEK','BULUT','DÜNYA','SABAH','AKŞAM','İNCİR','BİBER','PİLAV','KİRAZ','ÇİLEK','GÜZEL','SİMİT','BİLGİ','KAPAK','KÜREK','TABAK','ÇANTA','KEMER','DOLAP','RADYO','FIRIN','YAZAR','KÖPRÜ','SICAK','SOĞUK','KÜÇÜK','BÜYÜK','TEMİZ','SAKİN','TARİH','TAKİP','YAKIN','ZAMAN','YEMEK','RESİM','KURAL','MUTLU','HUZUR','SEVGİ','NEHİR','YÜREK','BEYAZ','SİYAH','YEŞİL','ALTIN','KUZEY','GÜNEY','ÇINAR','ARMUT','KAVUN','LİMON','BALIK','SINIF','MASAL','MÜZİK','SANAT','PAZAR','SAHİL','MERAK','CESUR','GÜVEN','BARIŞ','ÇORBA','EKMEK','KAHVE','KAŞIK','ÇATAL','TABLO','PERDE','LAMBA','KİLİM','BAKIR','DEMİR','ÇAMUR','YAĞIZ','YAĞLI','KURUŞ','PARÇA','DİLEK','NİYET','HAYAL','DOĞRU','TATLI','TUZLU','GÖLGE','ÇÖZÜM'];const L=['E','R','T','Y','U','I','O','P','Ğ','Ü','A','S','D','F','G','H','J','K','L','Ş','İ','Z','C','V','B','N','M','Ö','Ç'];let ANSWERS=[],VALID=new Set(),ans='',row=0,col=0,guess='',over=false,history=[],ready=false;const U='harfist_used_stable_v3',S='harfist_stats_stable_v3',$=x=>document.getElementById(x);function up(t){return(t||'').toLocaleUpperCase('tr-TR').replaceAll('Â','A').replaceAll('Î','İ').replaceAll('Û','U')}function is5(w){return[...w].length===5&&[...w].every(ch=>L.includes(ch))}function clean(a){let seen=new Set(),bad=new Set(['REYRİ','BANİK','BBBBB','MANTU','RENKL','ÇİFTÇ','KÖTÜL','YAPRA','YÜKSE','TAKİM']);return a.map(up).filter(w=>is5(w)&&!bad.has(w)&&!seen.has(w)&&seen.add(w))}async function loadWords(){try{let r=await fetch('data/answers.json?stable=4',{cache:'no-store'});if(!r.ok)throw Error();ANSWERS=clean(await r.json());if(ANSWERS.length<100)throw Error()}catch(e){ANSWERS=clean(FALLBACK)}VALID=new Set([...ANSWERS,...clean(FALLBACK)]);['ÇÖZÜM','ACEMİ','ARİFE','KİTAP'].forEach(w=>VALID.add(w));ready=true;$('sub').textContent='Türkçe kelime oyunu';start()}function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}function set(k,v){localStorage.setItem(k,JSON.stringify(v))}function def(){return{p:0,w:0,l:0,cs:0,bs:0,d:[0,0,0,0,0,0],tg:0}}function build(){let b=$('board');b.innerHTML='';for(let r=0;r<6;r++){let ro=document.createElement('div');ro.className='row';for(let c=0;c<5;c++){let t=document.createElement('div');t.className='tile';t.id=`t${r}${c}`;ro.appendChild(t)}b.appendChild(ro)}let k=$('keys');k.innerHTML='';[['E','R','T','Y','U','I','O','P','Ğ','Ü'],['A','S','D','F','G','H','J','K','L','Ş','İ'],['Z','C','V','B','N','M','Ö','Ç','SİL']].forEach(a=>{let ro=document.createElement('div');ro.className='kr';a.forEach(x=>{let bt=document.createElement('button');bt.className=x==='SİL'?'key action':'key';bt.dataset.key=x;bt.textContent=x;bt.onclick=()=>press(x);ro.appendChild(bt)});k.appendChild(ro)})}function update(){let s=get(S,def());$('try').textContent=over?'Bitti':`${Math.min(row+1,6)}/6`;$('streak').textContent=s.cs}function pick(){let u=get(U,[]),used=new Set(u),av=ANSWERS.filter(w=>!used.has(w));if(!av.length){u=[];av=ANSWERS;toast('Kelime listesi yenilendi')}let w=av[Math.floor(Math.random()*av.length)];u.push(w);set(U,u);return w}function start(){if(!ready){toast('Sözlük hazırlanıyor');return}ans=pick();row=0;col=0;guess='';over=false;history=[];build();update()}function press(x){if(over)return;if(x==='SİL')del();else if(L.includes(x))add(x)}function add(x){if(col>=5)return;guess+=x;let t=$(`t${row}${col}`);t.textContent=x;t.classList.add('filled');col++}function del(){if(col<=0)return;col--;guess=guess.slice(0,-1);let t=$(`t${row}${col}`);t.textContent='';t.className='tile'}function shake(){for(let i=0;i<5;i++){let t=$(`t${row}${i}`);t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),300)}}function submit(){if(over)return;guess=up(guess);if(guess.length!==5){shake();toast('5 harfli kelime gir');return}if(!VALID.has(guess)){shake();toast('Bu kelime uygun görünmüyor. Deneme hakkın gitmedi.');return}let pattern=reveal(guess);history.push(pattern);if(guess===ans){over=true;win(row+1);update();setTimeout(()=>modal('Tebrikler 🎉',`<p>Kelime: <b>${ans}</b></p><p>${row+1}. denemede bildin.</p>`),350);return}row++;col=0;guess='';update();if(row>=6){over=true;lose();update();setTimeout(()=>modal('Oyun bitti',`<p>Doğru kelime: <b>${ans}</b></p>`),350)}}function reveal(w){let a=[...ans],q=[...w],res=Array(5).fill('gray'),rr=row;for(let i=0;i<5;i++)if(q[i]===a[i]){res[i]='green';a[i]=null;q[i]=null}for(let i=0;i<5;i++)if(q[i]&&a.includes(q[i])){res[i]='yellow';a[a.indexOf(q[i])]=null}for(let i=0;i<5;i++){setTimeout(()=>{$(`t${rr}${i}`).classList.add(res[i]);keyColor(w[i],res[i])},i*70)}return res.map(x=>x==='green'?'🟩':x==='yellow'?'🟨':'⬛').join('')}function keyColor(ch,c){let k=document.querySelector(`button[data-key="${ch}"]`);if(!k)return;let p={gray:1,yellow:2,green:3},old=['green','yellow','gray'].find(x=>k.classList.contains(x));if(!old||p[c]>p[old]){k.classList.remove('green','yellow','gray');k.classList.add(c)}}function win(n){let s=get(S,def());s.p++;s.w++;s.cs++;s.bs=Math.max(s.bs,s.cs);s.d[n-1]++;s.tg+=n;set(S,s)}function lose(){let s=get(S,def());s.p++;s.l++;s.cs=0;set(S,s)}function stats(){let s=get(S,def()),rate=s.p?Math.round(s.w/s.p*100):0,avg=s.w?(s.tg/s.w).toFixed(2):'0';modal('Başarı Grafiği',`<div class=statgrid><div class=stat><div class=num>${s.p}</div><div>Toplam</div></div><div class=stat><div class=num>${rate}%</div><div>Başarı</div></div><div class=stat><div class=num>${s.cs}</div><div>Seri</div></div><div class=stat><div class=num>${avg}</div><div>Ortalama</div></div></div>`)}function share(){let txt=`HARFIST ${history.length||'-'}/6\n${history.join('\n')}\nhttps://gibiamie.github.io/Harfist/`;if(navigator.share)navigator.share({text:txt});else navigator.clipboard.writeText(txt).then(()=>toast('Sonuç kopyalandı'))}function modal(t,h){$('mt').textContent=t;$('mc').innerHTML=h;$('ma').innerHTML='<button onclick="closeM();start()">Yeni oyun</button><button class="secondary" onclick="share()">Paylaş</button><button class="secondary" onclick="closeM()">Kapat</button>';$('modal').classList.add('show')}function closeM(){$('modal').classList.remove('show')}function toast(m){let x=$('toast');x.textContent=m;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1700)}$('submit').onclick=submit;$('newGame').onclick=start;$('stats').onclick=stats;$('share').onclick=share;$('help').onclick=()=>modal('Nasıl oynanır?','<p>5 harfli Türkçe kelimeyi 6 denemede bul.</p><p>Yeşil: doğru yer. Sarı: harf var ama yeri yanlış. Kırmızı: harf kelimede yok.</p><p>Uygun olmayan kelimelerde deneme hakkı gitmez.</p>');document.addEventListener('keydown',e=>{let k=up(e.key);if(e.key==='Enter')submit();else if(e.key==='Backspace')del();else if(L.includes(k))add(k)});build();loadWords();</script></body></html>
