<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Harfist</title><style>:root{--bg:#08111d;--line:#ffffff22;--txt:#f8fbff;--mut:#9eadbe;--g:#35a853;--y:#d7a72f;--bad:#ef6f6c;--x:#343e4c;--k:#2f3d50}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100dvh;background:radial-gradient(circle at top,#17304e 0,#08111d 58%);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;display:flex;justify-content:center}.app{width:100%;max-width:480px;min-height:100dvh;padding:14px;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#42d66f,#7dd3fc);display:grid;place-items:center;color:#06120a;font-weight:1000;box-shadow:0 12px 28px #38bdf833}h1{margin:0;font-size:27px}.sub{font-size:12px;color:var(--mut)}button{cursor:pointer}.icon{border:1px solid var(--line);border-radius:13px;background:#ffffff12;color:white;font-weight:1000;padding:11px 12px}.status{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.pill{border:1px solid var(--line);border-radius:16px;background:#ffffff10;padding:10px}.lab{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px}.val{font-weight:1000}.center{text-align:center}.right{text-align:right}.board{margin:auto;display:grid;gap:8px;width:min(92vw,350px)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tile{aspect-ratio:1/1;border:2px solid var(--line);border-radius:13px;display:grid;place-items:center;background:#ffffff10;font-size:clamp(29px,8vw,37px);font-weight:1000;box-shadow:0 10px 20px #0005}.filled{border-color:#7dd3fc;background:#7dd3fc14}.green{background:linear-gradient(#37b85a,#2f9549)!important}.yellow{background:linear-gradient(#e2b63d,#c99c25)!important}.gray{background:linear-gradient(#465163,#303946)!important;color:#dce5f1}.shake{animation:shake .28s}.keys{display:flex;flex-direction:column;gap:7px;margin-top:18px}.kr{display:flex;justify-content:center;gap:5px}.key{height:45px;min-width:30px;border:0;border-radius:10px;background:linear-gradient(#3b4a60,#2c3849);color:white;font-weight:1000}.key.action{min-width:62px;background:linear-gradient(#eef2f7,#cdd5df);color:#111}.key.green{background:var(--g)!important}.key.yellow{background:var(--y)!important}.key.gray{background:var(--bad)!important;color:white!important;box-shadow:0 0 0 2px #ffffff22 inset}.try{height:53px;margin:13px auto 0;width:78%;border:0;border-radius:17px;background:linear-gradient(135deg,#38bdf8,#35a853);font-weight:1000;font-size:18px;color:#041014}.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#fff;color:#111827;padding:11px 17px;border-radius:14px;font-weight:900;opacity:0;transition:.2s;max-width:92%;text-align:center;z-index:9;box-shadow:0 20px 55px #0008}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;padding:18px;z-index:8;backdrop-filter:blur(8px)}.modal.show{display:grid}.box{width:min(410px,100%);background:#111b29;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 24px 70px #0008}.box h2{margin:0 0 10px}.box p{color:var(--mut);line-height:1.45}.box button{margin:6px;border:0;border-radius:13px;padding:12px 14px;font-weight:1000}.secondary{background:#ffffff16;color:#fff;border:1px solid var(--line)!important}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.stat{background:#ffffff10;border-radius:14px;padding:12px}.num{font-size:24px;font-weight:1000}.barrow{display:grid;grid-template-columns:26px 1fr 30px;gap:7px;align-items:center;margin:7px 0}.bar{height:18px;background:#ffffff14;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#38bdf8,#35a853)}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-width:380px){.key{min-width:27px;padding:0 5px}.tile{font-size:30px}.logo{width:39px;height:39px}h1{font-size:23px}}</style></head><body><div class="app"><div class="top"><div class="brand"><div class="logo">H</div><div><h1>Harfist</h1><div class="sub" id="sub">Sözlük hazırlanıyor...</div></div></div><div><button class="icon" id="newGame">↻</button><button class="icon" id="share">↗</button><button class="icon" id="stats">▥</button><button class="icon" id="help">?</button></div></div><div class="status"><div class="pill"><div class="lab">Liste</div><div class="val">GOLD LIST</div></div><div class="pill center"><div class="lab">Deneme</div><div class="val" id="try">1/6</div></div><div class="pill right"><div class="lab">Seri</div><div class="val" id="streak">0</div></div></div><main class="board" id="board"></main><section class="keys" id="keys"></section><button class="try" id="submit">DENE</button></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><h2 id="mt"></h2><div id="mc"></div><div id="ma"></div></div></div><script>const SRC='https://raw.githubusercontent.com/LibreOffice/dictionaries/master/tr_TR/tr_TR.dic';const L=['E','R','T','Y','U','I','O','P','Ğ','Ü','A','S','D','F','G','H','J','K','L','Ş','İ','Z','C','V','B','N','M','Ö','Ç'];const SEED=`ACEMİ ARİFE ARİZA KİTAP KALEM DENİZ GÜNEŞ ÇİÇEK ŞEKER KÖPEK BULUT DÜNYA SABAH AKŞAM İNCİR BİBER PİLAV KİRAZ ÇİLEK GÜZEL SİMİT BİLGİ KAPAK KÜREK TABAK ÇANTA KEMER DOLAP RADYO FIRIN YAZAR KÖPRÜ SICAK SOĞUK KÜÇÜK BÜYÜK TEMİZ SAKİN TARİH TAKİP YAKIN ZAMAN YEMEK RESİM KURAL MUTLU HUZUR SEVGİ NEHİR YÜREK BEYAZ SİYAH YEŞİL ALTIN KUZEY GÜNEY ÇINAR ARMUT KAVUN LİMON BALIK SINIF MASAL MÜZİK SANAT PAZAR SAHİL MERAK CESUR GÜVEN BARIŞ ÇORBA EKMEK KAHVE KAŞIK ÇATAL TABLO PERDE LAMBA KİLİM BAKIR DEMİR ÇAMUR YAĞIZ YAĞLI KURUŞ PARÇA DİLEK NİYET HAYAL DOĞRU TATLI TUZLU GÖLGE ADALE AHLAK AKRAN AKREP AKSAK AKSAM AKSAN AKTAR AKTİF ALACA ALARM ALEVİ ALGIN ALKIŞ AMBAR ANLAM ANLIK ANONS ARADA ARAZİ ARDIÇ ARENA ARŞIN ASKER ASLAN ASTAR AŞAMA AŞILI ATLAS AYDIN AYLAK AYRAÇ AYRAN AYRIM AZGIN AZILI BACAK BADEM BAHAR BAHÇE BAKIM BALCI BALON BAMYA BARAK BARON BASIN BAŞAK BAŞKA BATAK BATIK BAVUL BAYAN BAYIR BEDEL BEDEN BEKAR BEKÇİ BELGE BENEK BEŞİK BETON BEYİN BEYİT BİÇİM BİLET BİLİM BİRİM BİTKİ BİZİM BOĞAZ BOĞUM BOLCA BOMBA BORAN BORSA BOYUN BOYUT BOZUK BÖCEK BÖLGE BÖLÜM BÖREK CANLI CEVAP CİHAZ CİDDİ CİĞER CÜMLE ÇAKAL ÇAKIR ÇAKMA ÇALGI ÇANAK ÇAPAK ÇARIK ÇATIŞ ÇAVUŞ ÇEKİM ÇELİK ÇEVRE ÇİMEN ÇOCUK ÇORAP ÇÖREK ÇUBUK ÇUKUR ÇUVAL DAKİK DALGA DAMAK DAMAR DAVET DAVUL DAYAK DEĞER DEĞİL DELİK DEMET DENEK DENET DERİN DESEN DESTE DEVAM DEVİR DİKEN DİKİM DİLİM DİNAR DİREK DİŞLİ DİVAN DİZEL DOĞAL DOĞAN DOLGU DOLMA DONUK DORUK DOSYA DUMAN DURAK DURUM DUVAR DÜMEN DÜŞÜK DÜZEN EKLEM EKRAN EKSEN EKSİK ELBET ELMAS ENGEL ENKAZ ERDEM ERKEN ERKEK ESKİZ EŞARP EŞSİZ ETKİN EVRAK EVREN FALAN FALCI FASIL FAYDA FENER FERAH FİDAN FİKİR FİNAL FİRAR FİŞEK FİTİL FİYAT FİZİK FORMA GARİP GAZEL GAZOZ GEÇER GELEN GELİR GENEL GENİŞ GERÇİ GEREK GİRİŞ GİYİM GİZEM GÖBEK GÖNÜL GÖREV GÖRÜŞ GÜBRE GÜÇLÜ GÜLÜŞ GÜMÜŞ HABER HAFİF HAKEM HALKA HAMAM HAMLE HANGİ HAPİS HASAR HASTA HATIR HAVUÇ HAYAT HAZIR HELAL HEMEN HEVES HIZLI HİLAL HİSSE HOROZ HOŞAF ILICA IRMAK ISLAK İBARE İÇERİ İÇLİK İDARE İDDİA İDRAR İFLAS İHRAÇ İHTAR İKLİM İKRAM İLAVE İLERİ İLGİN İLKEL İNANÇ İNSAN İPLİK İPUCU İRADE İRMİK İŞLEM İŞTAH İTHAL İTİCİ İZAFİ KABAK KABAN KABİN KABLO KAÇAK KADER KADIN KADRO KAFES KAHIR KALAN KALIN KALİP KANAL KANAT KANIT KANUN KAPAN KAPLI KARAR KARGA KARIN KARLI KARMA KARNE KARŞI KASAP KASIM KATIL KATIR KAYAK KAYIP KAYIT KAZAK KAZAN KEBAP KEMAN KENAR KENDİ KEPÇE KESER KESİN KESİT KEŞİF KETEN KILIK KIRIK KISIM KISIR KİBAR KİLER KİLİT KİMSE KİRLİ KOMİK KOMŞU KONUT KORKU KORNA KOVAN KOYUN KREDİ KUMAR KUMRU KURGU KUŞAK KÜLAH KÜMES KÜRSÜ LAKAP LAZIM LİDER LİMAN LİSTE LODOS LOKAL LOKMA LÜZUM MADDE MADEN MAHİR MAKAS MAKET MAKUL MALUM MANTI MARUL MASKE MAYIN MAYIS MEKAN MELEK MERMİ MESAJ METAL METİN MEYİL MEZAR MİRAS MİSAK MİSAL MİZAH MODEL MOTOR MUCİT MÜDÜR MÜHÜR MÜJDE NADİR NAKİL NAMAZ NAMLU NASIL NAZAR NEFES NEMLİ NESİL NESNE NİKAH NİMET NİSAN NİŞAN NOKTA NÖBET OĞLAK OKUMA OLGUN ORMAN ORTAK OTLAK OYNAK ÖDEME ÖKSÜZ ÖLÇEK ÖLÇÜM ÖNDER ÖRDEK ÖRGÜT ÖRNEK ÖTEKİ ÖZGÜR PAKET PAMUK PANEL PASTA PATEN PATİK PERON PİLOT PLAKA POLEN POMPA RADAR RAHAT RAKAM REHİN RESMİ RİTİM ROKET ROMAN SABAN SABIR SABİT SAÇAK SADIK SAĞIR SAKIZ SALON SAMAN SANAL SANCI SANKİ SARAY SATIR SAVAŞ SAYGI SAYIM SEBEP SEÇİM SEDİR SEFER SEHPA SEKİZ SELAM SEMER SENET SERAP SERÇE SERİN SESLİ SEVDA SEVİM SEYİR SIFIR SİCİL SİHİR SİLAH SİLGİ SİMGE SİNİR SİPER SİTEM SOKAK SOLUK SOMUN SONAR SONUÇ SORGU SORUN SÖĞÜT SÖZCÜ SÖZLÜ SUÇLU SULAK SURAT SÜLÜK SÜREÇ SÜRGÜ SÜRÜM ŞAKAK ŞAMAN ŞAPKA ŞARKI ŞEHİR ŞEKİL ŞERİF ŞOFÖR TABAN TACİR TAKAS TAKIM TALAN TALEP TAMAM TANIK TARAF TARAK TARİF TAŞIT TATİL TAVAN TAVIR TAYİN TEKEL TEKİN TELİF TEMEL TEMPO TENİS TERAS TERİM TERLİ TERSİ TESİR TESTİ TETİK TIBBİ TİCAR TİLKİ TOHUM TOKAT TOPAK TOPAL TORBA TORUN TOSUN TUĞLA TUHAF TUTAR TÜFEK TÜNEL TÜRLÜ UCUBE UĞRAK UNVAN UYARI UYGUN UZMAN ÜCRET ÜÇGEN ÜSTEL ÜSTÜN ÜZERE VAHİM VAKIF VAKİT VALİZ VAPUR VARAN VARİL VASAT VATAN VERGİ VEZİR VİDEO VİRÜS VİTES YABAN YAĞIŞ YAHUT YALAN YALIN YAMUK YANAK YANIT YARAR YARGI YARIM YAŞAM YATAK YATAY YAVRU YAYIN YAZGI YEREL YETER YETİM YILAN YOLCU YORUM ZAFER ZARAR ZARİF ZEHİR ZEMİN ZİHİN ZORUN ÇÖZÜM`.split(' ');let GOLD=[],MASTER=new Set(),ready=false,ans='',row=0,col=0,guess='',over=false,history=[];const U='harfist_used_v10',S='harfist_stats_v10',$=x=>document.getElementById(x);function up(t){return t.toLocaleUpperCase('tr-TR').replaceAll('Â','A').replaceAll('Î','İ').replaceAll('Û','U')}function is5(w){return [...w].length===5&&[...w].every(ch=>L.includes(ch))}function parseDic(txt){const set=new Set();for(const line of txt.split(/\r?\n/)){let base=line.split('/')[0].trim();if(!base||base==='75909')continue;if(base!==base.toLocaleLowerCase('tr-TR'))continue;let w=up(base);if(is5(w))set.add(w)}return [...set].sort((a,b)=>a.localeCompare(b,'tr'))}function score(w){const vowels='AEIİOÖUÜ';let v=[...w].filter(c=>vowels.includes(c)).length;let rare=[...w].filter(c=>'JQWX'.includes(c)).length;let common=/^(BA|BE|Bİ|BO|BU|DA|DE|Dİ|KA|KE|Kİ|KO|KU|SA|SE|Sİ|TA|TE|YA|YE|HA|HE|İL|İN|AR|AL|AN|AK|ER|EL|GE|GÖ|GÜ|ÇE|ÇA|ŞE)/.test(w)?0:1;return common*4+Math.abs(v-2)*5+rare*10}async function loadWords(){try{let raw=localStorage.getItem('harfist_dic_cache_v1');if(!raw){raw=await fetch(SRC,{cache:'force-cache'}).then(r=>r.text());localStorage.setItem('harfist_dic_cache_v1',raw)}const all=parseDic(raw);MASTER=new Set(all);for(const w of SEED)MASTER.add(w);GOLD=[...new Set(SEED.filter(w=>MASTER.has(w)))];for(const w of all.sort((a,b)=>score(a)-score(b)||a.localeCompare(b,'tr'))){if(!GOLD.includes(w))GOLD.push(w);if(GOLD.length>=2000)break}if(GOLD.length<500||MASTER.size<5000)throw Error('dictionary not ready');document.getElementById('sub').textContent='Türkçe kelime oyunu';}catch(e){GOLD=SEED;MASTER=new Set(SEED);document.getElementById('sub').textContent='Çevrimdışı güvenli mod'}ready=true;runQA();start()}function runQA(){const ok=['ACEMİ','ÇÖZÜM','ASKER','ŞEHİR','TARİH'].every(w=>MASTER.has(w));const bad=['BBBBB','REYRİ','BANİK','ZXCVB'].every(w=>!MASTER.has(w));if(!ok||!bad)console.warn('Harfist QA warning',{ok,bad})}function get(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}function set(k,v){localStorage.setItem(k,JSON.stringify(v))}function def(){return{p:0,w:0,l:0,cs:0,bs:0,d:[0,0,0,0,0,0],tg:0}}function build(){let b=$('board');b.innerHTML='';for(let r=0;r<6;r++){let ro=document.createElement('div');ro.className='row';for(let c=0;c<5;c++){let t=document.createElement('div');t.className='tile';t.id=`t${r}${c}`;ro.appendChild(t)}b.appendChild(ro)}let k=$('keys');k.innerHTML='';[['E','R','T','Y','U','I','O','P','Ğ','Ü'],['A','S','D','F','G','H','J','K','L','Ş','İ'],['Z','C','V','B','N','M','Ö','Ç','SİL']].forEach(a=>{let ro=document.createElement('div');ro.className='kr';a.forEach(x=>{let bt=document.createElement('button');bt.className=x==='SİL'?'key action':'key';bt.dataset.key=x;bt.textContent=x;bt.onclick=()=>press(x);ro.appendChild(bt)});k.appendChild(ro)})}function update(){let s=get(S,def());$('try').textContent=over?'Bitti':`${Math.min(row+1,6)}/6`;$('streak').textContent=s.cs}function pick(){let u=get(U,[]),used=new Set(u),av=GOLD.filter(w=>!used.has(w));if(!av.length){u=[];av=GOLD;toast('GOLD LIST yenilendi')}let w=av[Math.floor(Math.random()*av.length)];u.push(w);set(U,u);return w}function start(){if(!ready){toast('Sözlük hazırlanıyor');return}ans=pick();row=0;col=0;guess='';over=false;history=[];build();update()}function press(x){if(over)return;if(x==='SİL')del();else if(L.includes(x))add(x)}function add(x){if(col>=5)return;guess+=x;let t=$(`t${row}${col}`);t.textContent=x;t.classList.add('filled');col++}function del(){if(col<=0)return;col--;guess=guess.slice(0,-1);let t=$(`t${row}${col}`);t.textContent='';t.className='tile'}function shake(){for(let i=0;i<5;i++){let t=$(`t${row}${i}`);t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),300)}}function submit(){if(over)return;if(guess.length!==5){shake();toast('5 harfli kelime gir');return}if(!MASTER.has(guess)){shake();toast('Bu kelime uygun görünmüyor. Deneme hakkın gitmedi.');return}let pattern=reveal(guess);history.push(pattern);if(guess===ans){over=true;win(row+1);update();setTimeout(()=>modal('Tebrikler 🎉',`<p>Kelime: <b>${ans}</b></p><p>${row+1}. denemede bildin.</p>`),350);return}row++;col=0;guess='';update();if(row>=6){over=true;lose();update();setTimeout(()=>modal('Oyun bitti',`<p>Doğru kelime: <b>${ans}</b></p>`),350)}}function reveal(w){let a=[...ans],q=[...w],res=Array(5).fill('gray'),rr=row;for(let i=0;i<5;i++)if(q[i]===a[i]){res[i]='green';a[i]=null;q[i]=null}for(let i=0;i<5;i++)if(q[i]&&a.includes(q[i])){res[i]='yellow';a[a.indexOf(q[i])]=null}for(let i=0;i<5;i++){setTimeout(()=>{$(`t${rr}${i}`).classList.add(res[i]);keyColor(w[i],res[i])},i*80)}return res.map(x=>x==='green'?'🟩':x==='yellow'?'🟨':'⬛').join('')}function keyColor(ch,c){let k=document.querySelector(`button[data-key="${ch}"]`);if(!k)return;let p={gray:1,yellow:2,green:3},old=['green','yellow','gray'].find(x=>k.classList.contains(x));if(!old||p[c]>p[old]){k.classList.remove('green','yellow','gray');k.classList.add(c)}}function win(n){let s=get(S,def());s.p++;s.w++;s.cs++;s.bs=Math.max(s.bs,s.cs);s.d[n-1]++;s.tg+=n;set(S,s)}function lose(){let s=get(S,def());s.p++;s.l++;s.cs=0;set(S,s)}function stats(){let s=get(S,def()),rate=s.p?Math.round(s.w/s.p*100):0,avg=s.w?(s.tg/s.w).toFixed(2):'0',mx=Math.max(1,...s.d);modal('Başarı Grafiği',`<div class=statgrid><div class=stat><div class=num>${s.p}</div><div>Toplam</div></div><div class=stat><div class=num>${rate}%</div><div>Başarı</div></div><div class=stat><div class=num>${s.cs}</div><div>Seri</div></div><div class=stat><div class=num>${avg}</div><div>Ortalama</div></div></div>${s.d.map((v,i)=>`<div class=barrow><b>${i+1}</b><div class=bar><div class=fill style="width:${v?Math.max(7,v/mx*100):0}%"></div></div><span>${v}</span></div>`).join('')}`)}function share(){let txt=`HARFIST ${history.length||'-'}/6\n${history.join('\n')}\nhttps://gibiamie.github.io/Harfist/`;if(navigator.share)navigator.share({text:txt});else navigator.clipboard.writeText(txt).then(()=>toast('Sonuç kopyalandı'))}function modal(t,h){$('mt').textContent=t;$('mc').innerHTML=h;$('ma').innerHTML='<button onclick="closeM();start()">Yeni oyun</button><button class="secondary" onclick="share()">Paylaş</button><button class="secondary" onclick="closeM()">Kapat</button>';$('modal').classList.add('show')}function closeM(){$('modal').classList.remove('show')}function toast(m){let x=$('toast');x.textContent=m;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1700)}$('submit').onclick=submit;$('newGame').onclick=start;$('stats').onclick=stats;$('share').onclick=share;$('help').onclick=()=>modal('Nasıl oynanır?','<p>5 harfli Türkçe kelimeyi 6 denemede bul.</p><p>Yeşil: doğru yer. Sarı: harf var ama yeri yanlış. Coral/kırmızı: harf kelimede yok.</p><p>Uygun olmayan kelimelerde deneme hakkı gitmez.</p>');document.addEventListener('keydown',e=>{let k=up(e.key);if(e.key==='Enter')submit();else if(e.key==='Backspace')del();else if(L.includes(k))add(k)});build();loadWords();</script></body></html>
