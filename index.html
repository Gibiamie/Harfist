<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Harfist</title><style>body{margin:0;background:#07101a;color:white;font-family:system-ui,Arial;display:flex;justify-content:center}.app{width:100%;max-width:460px;min-height:100vh;padding:14px;display:flex;flex-direction:column}header{display:flex;justify-content:space-between;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#42d66f,#7dd3fc);display:grid;place-items:center;color:#06120a;font-weight:1000}.brand{display:flex;gap:10px;align-items:center}h1{margin:0}.sub{color:#9fa8b6;font-size:12px}.btn{border:1px solid #ffffff22;border-radius:12px;background:#ffffff12;color:white;font-weight:900;padding:11px}.status{display:flex;justify-content:space-between;margin:14px 0;padding:10px;border:1px solid #ffffff22;border-radius:16px;background:#ffffff10}.lab{font-size:11px;color:#9fa8b6}.val{font-weight:900}.board{margin:auto;display:grid;gap:8px;width:min(92vw,350px)}.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tile{aspect-ratio:1/1;border:2px solid #ffffff22;border-radius:12px;display:grid;place-items:center;font-size:34px;font-weight:1000;background:#ffffff10}.filled{border-color:#7dd3fc}.green{background:#35a853!important}.yellow{background:#d7a72f!important}.gray{background:#3b4350!important}.shake{animation:shake .28s}.keys{display:flex;flex-direction:column;gap:7px;margin-top:18px}.kr{display:flex;justify-content:center;gap:5px}.key{height:45px;min-width:30px;border:0;border-radius:9px;background:#344154;color:white;font-weight:900}.key.action{min-width:60px;background:#dbe1e8;color:#111}.try{height:52px;margin:12px auto 0;width:75%;border:0;border-radius:16px;background:linear-gradient(135deg,#38bdf8,#35a853);font-weight:1000;font-size:18px}.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:white;color:#111;padding:11px 17px;border-radius:12px;font-weight:900;opacity:0;transition:.2s}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;padding:18px}.modal.show{display:grid}.box{max-width:390px;background:#151d28;border:1px solid #ffffff22;border-radius:20px;padding:20px}.box button{margin:6px;border:0;border-radius:12px;padding:12px 14px;font-weight:900}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:#ffffff10;border-radius:12px;padding:10px}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}@media(max-width:380px){.key{min-width:27px;padding:0 5px}.tile{font-size:30px}}</style></head><body><div class="app"><header><div class="brand"><div class="logo">H</div><div><h1>Harfist</h1><div class="sub">Güvenli Türkçe kelime sürümü</div></div></div><div><button class="btn" id="newGame">↻</button><button class="btn" id="stats">▥</button><button class="btn" id="help">?</button></div></header><div class="status"><div><div class="lab">Kelime</div><div class="val" id="used">0/0</div></div><div><div class="lab">Deneme</div><div class="val" id="try">1/6</div></div><div><div class="lab">Seri</div><div class="val" id="streak">0</div></div></div><main class="board" id="board"></main><section class="keys" id="keys"></section><button class="try" id="submit">DENE</button></div><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><h2 id="mt"></h2><div id="mc"></div><div id="ma"></div></div></div><script>const WORDS=['ACEMİ','ARİFE','ARİZA','KİTAP','KALEM','DENİZ','GÜNEŞ','ÇİÇEK','ŞEKER','KÖPEK','BULUT','DÜNYA','SABAH','AKŞAM','İNCİR','BİBER','PİLAV','KİRAZ','ÇİLEK','GÜZEL','SİMİT','BİLGİ','KAPAK','KÜREK','TABAK','ÇANTA','KEMER','DOLAP','RADYO','FIRIN','YAZAR','KÖPRÜ','SICAK','SOĞUK','KÜÇÜK','BÜYÜK','TEMİZ','SAKİN','TARİH','TAKİP','YAKIN','ZAMAN','YEMEK','RESİM','KURAL','MUTLU','HUZUR','SEVGİ','NEHİR','YÜREK','BEYAZ','SİYAH','YEŞİL','ALTIN','KUZEY','GÜNEY','ÇINAR','KAVAK','ARMUT','KAVUN','LİMON','BALIK','SINIF','MASAL','MÜZİK','SANAT','PAZAR','SAHİL','MERAK','CESUR','GÜVEN','BARIŞ','ÇORBA','EKMEK','KAHVE','TABLO','PERDE','LAMBA','KİLİM','BAKIR','DEMİR','ÇAMUR','YAĞIZ','YAĞLI','KURUŞ','PARÇA','DİLEK','NİYET','HAYAL','DOĞRU','TATLI','TUZLU','GÖLGE'];const VALID=new Set(WORDS),LET=['E','R','T','Y','U','I','O','P','Ğ','Ü','A','S','D','F','G','H','J','K','L','Ş','İ','Z','C','V','B','N','M','Ö','Ç'];let ans='',r=0,c=0,g='',over=false;const U='harfist_used_v2',S='harfist_stats_v2',$=x=>document.getElementById(x);function up(t){return t.toLocaleUpperCase('tr-TR')}function good(w){return [...w].length===5&&[...w].every(x=>LET.includes(x))&&VALID.has(w)}function gu(){try{return JSON.parse(localStorage.getItem(U)||'[]')}catch(e){return[]}}function su(v){localStorage.setItem(U,JSON.stringify(v))}function ds(){return{p:0,w:0,l:0,cs:0,bs:0,d:[0,0,0,0,0,0],tg:0}}function gs(){try{return JSON.parse(localStorage.getItem(S)||'null')||ds()}catch(e){return ds()}}function ss(s){localStorage.setItem(S,JSON.stringify(s))}function board(){let b=$('board');b.innerHTML='';for(let i=0;i<6;i++){let row=document.createElement('div');row.className='row';for(let j=0;j<5;j++){let t=document.createElement('div');t.className='tile';t.id=`t${i}${j}`;row.appendChild(t)}b.appendChild(row)}}function keys(){let k=$('keys');k.innerHTML='';[['E','R','T','Y','U','I','O','P','Ğ','Ü'],['A','S','D','F','G','H','J','K','L','Ş','İ'],['Z','C','V','B','N','M','Ö','Ç','SİL']].forEach(a=>{let row=document.createElement('div');row.className='kr';a.forEach(x=>{let b=document.createElement('button');b.className=x==='SİL'?'key action':'key';b.textContent=x;b.onclick=()=>key(x);row.appendChild(b)});k.appendChild(row)})}function topu(){let s=gs();$('used').textContent=`${gu().length}/${WORDS.length}`;$('try').textContent=over?'Bitti':`${Math.min(r+1,6)}/6`;$('streak').textContent=s.cs}function pick(){let u=gu(),set=new Set(u),av=WORDS.filter(w=>!set.has(w));if(!av.length){su([]);av=WORDS;u=[]}let w=av[Math.floor(Math.random()*av.length)];u.push(w);su(u);return w}function start(){ans=pick();r=0;c=0;g='';over=false;board();keys();topu();toast('Yeni oyun başladı')}function key(x){if(over)return;if(x==='SİL')del();else if(LET.includes(x))add(x)}function add(x){if(c>=5)return;g+=x;let t=$(`t${r}${c}`);t.textContent=x;t.classList.add('filled');c++}function del(){if(c<=0)return;c--;g=g.slice(0,-1);let t=$(`t${r}${c}`);t.textContent='';t.className='tile'}function shake(){for(let i=0;i<5;i++){let t=$(`t${r}${i}`);t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),300)}}function submit(){if(over)return;if(g.length!==5){shake();toast('5 harfli kelime gir');return}if(!good(g)){shake();toast('Sözlükte olmayan kelime kabul edilmez');return}reveal(g);if(g===ans){over=true;win(r+1);topu();setTimeout(()=>modal('Tebrikler',`<p>Kelime: <b>${ans}</b></p><p>${r+1}. denemede bildin.</p>`),300);return}r++;c=0;g='';topu();if(r>=6){over=true;lose();topu();setTimeout(()=>modal('Oyun bitti',`<p>Doğru kelime: <b>${ans}</b></p>`),300)}}function reveal(w){let a=[...ans],q=[...w],res=Array(5).fill('gray'),rr=r;for(let i=0;i<5;i++)if(q[i]===a[i]){res[i]='green';a[i]=null;q[i]=null}for(let i=0;i<5;i++)if(q[i]&&a.includes(q[i])){res[i]='yellow';a[a.indexOf(q[i])]=null}for(let i=0;i<5;i++)$(`t${rr}${i}`).classList.add(res[i])}function win(n){let s=gs();s.p++;s.w++;s.cs++;s.bs=Math.max(s.bs,s.cs);s.d[n-1]++;s.tg+=n;ss(s)}function lose(){let s=gs();s.p++;s.l++;s.cs=0;ss(s)}function stats(){let s=gs(),rate=s.p?Math.round(s.w/s.p*100):0,avg=s.w?(s.tg/s.w).toFixed(2):'0';modal('Başarı Grafiği',`<div class=statgrid><div class=stat><b>${s.p}</b><br>Toplam</div><div class=stat><b>${rate}%</b><br>Başarı</div><div class=stat><b>${s.cs}</b><br>Seri</div><div class=stat><b>${avg}</b><br>Ortalama</div></div>`)}function modal(t,h){$('mt').textContent=t;$('mc').innerHTML=h;$('ma').innerHTML='<button onclick="closeM();start()">Yeni oyun</button><button onclick="closeM()">Kapat</button>';$('modal').classList.add('show')}function closeM(){$('modal').classList.remove('show')}function toast(m){let x=$('toast');x.textContent=m;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1500)}$('submit').onclick=submit;$('newGame').onclick=start;$('stats').onclick=stats;$('help').onclick=()=>modal('Nasıl oynanır?','<p>Güvenli listedeki 5 harfli Türkçe kelimeyi 6 denemede bul.</p><p>Liste dışı/anlamsız kelime kabul edilmez ve deneme hakkı gitmez.</p>');document.addEventListener('keydown',e=>{let k=up(e.key);if(e.key==='Enter')submit();else if(e.key==='Backspace')del();else if(LET.includes(k))add(k)});start();</script></body></html>
