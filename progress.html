<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harfist İlerleme</title>
<style>
body{margin:0;min-height:100vh;background:#07111e;color:white;font-family:system-ui,Arial;display:flex;justify-content:center}.app{width:min(94vw,720px);padding:18px}.top{display:flex;justify-content:space-between;align-items:center}.btn{color:#07111e;background:#7dd3fc;text-decoration:none;border-radius:14px;padding:11px 14px;font-weight:900}.sub{color:#a9b8ca}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{background:#ffffff12;border:1px solid #ffffff22;border-radius:18px;padding:16px}.num{font-size:34px;font-weight:1000}.bar{height:14px;background:#ffffff12;border-radius:99px;overflow:hidden}.fill{height:100%;background:#35a853;width:0}@media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body><main class="app"><div class="top"><div><h1>İlerleme</h1><div class="sub">Harfist performans özeti</div></div><a class="btn" href="index.html">Ana Menü</a></div><section class="grid"><div class="card"><div class="num" id="played">0</div><div class="sub">Toplam oyun</div></div><div class="card"><div class="num" id="wins">0</div><div class="sub">Kazanılan</div></div><div class="card"><div class="num" id="rate">0%</div><div class="sub">Başarı oranı</div></div><div class="card"><div class="num" id="streak">0</div><div class="sub">Mevcut seri</div></div><div class="card" style="grid-column:1/-1"><div class="sub">Genel başarı</div><div class="bar"><div class="fill" id="fill"></div></div></div></section><p><a class="btn" href="index.html">Klasik</a> <a class="btn" href="kelime-agi.html">Kelime Ağı</a></p></main><script>const KEY='harfist_stats_final_v4';function g(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return{}}}let s=g(),p=s.p||0,w=s.w||0,r=p?Math.round(w/p*100):0;played.textContent=p;wins.textContent=w;rate.textContent=r+'%';streak.textContent=s.cs||0;fill.style.width=r+'%';</script></body></html>
